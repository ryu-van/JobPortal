# Production Profile Configuration
# Strict security settings

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      ssl:
        enabled: true
      timeout: 3000

  cache:
    type: redis

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  jwt:
    secret: ${JWT_SECRET}
    access-expiration: ${JWT_ACCESS_EXPIRATION:900000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: ${MAIL_HOST}

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}

server:
  port: 8080
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

logging:
  level:
    com.example.jobportal: WARN
    org.springframework.security: WARN
    org.springframework.web: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

app:
  frontend:
    url: ${FRONTEND_URL}
  security:
    cookie:
      secure: true
      same-site: Strict
    cors:
      allowed-origins:
        - ${FRONTEND_URL}
    rate-limiting:
      enabled: true
      login:
        capacity: 5
        refill-period: 60  # seconds
      register:
        capacity: 3
        refill-period: 300  # 5 minutes
      api:
        capacity: 100
        refill-period: 60

cloudinary:
  cloud-name: ${CLOUD_NAME}
  api-key: ${CLOUD_API_KEY}
  api-secret: ${CLOUD_API_SECRET}
